<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BingBang — Mis Puntos</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #F0F4FF;
      --surface: #FFFFFF;
      --surface2: #F7F9FF;
      --border: rgba(99,102,241,.13);
      --accent1: #6366F1;
      --accent2: #8B5CF6;
      --teal: #06B6D4;
      --text: #1E1B4B;
      --muted: rgba(30,27,75,.45);
      --glow: rgba(99,102,241,.2);
      --shadow: 0 4px 24px rgba(99,102,241,.12);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { min-height:100vh; background:var(--bg); font-family:'Outfit',sans-serif; color:var(--text); overflow-x:hidden; }
    
    .container { position:relative; z-index:1; max-width:460px; margin:0 auto; padding:2.5rem 1.5rem 4rem; display:flex; flex-direction:column; align-items:center; }

    /* Header */
    .header { text-align:center; margin-bottom:2rem; }
    .logo-box { display:inline-flex; align-items:center; gap:.6rem; background:linear-gradient(135deg,var(--accent1),var(--accent2)); border-radius:18px; padding:.7rem 1.3rem; box-shadow:0 8px 32px var(--glow); }
    .logo-text { font-family:'Syne',sans-serif; font-size:1.35rem; font-weight:800; color:#fff; }
    .header h1 { font-family:'Syne',sans-serif; font-size:1.85rem; font-weight:800; margin-top:1rem; }
    .header h1 span { background:linear-gradient(135deg,var(--accent1),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

    /* Tabs */
    .tabs { display:flex; gap:.4rem; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:.35rem; margin-bottom:1.2rem; width:100%; box-shadow:var(--shadow); }
    .tab { flex:1; padding:.55rem .3rem; border:none; border-radius:12px; background:transparent; color:var(--muted); font-family:'Outfit',sans-serif; font-size:.82rem; font-weight:600; cursor:pointer; }
    .tab.active { background:linear-gradient(135deg,var(--accent1),var(--accent2)); color:#fff; }

    /* Form Card */
    .card { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:22px; padding:1.75rem; box-shadow:var(--shadow); }
    .panel { display:none; }
    .panel.active { display:block; }
    .field-label { font-size:.72rem; text-transform:uppercase; letter-spacing:1.8px; color:var(--accent1); font-weight:700; margin-bottom:.6rem; }
    .input-wrap { position:relative; margin-bottom:1.3rem; }
    input { width:100%; padding:.85rem 1rem .85rem 1rem; background:var(--surface2); border:1.5px solid var(--border); border-radius:13px; color:var(--text); font-family:'Outfit',sans-serif; outline:none; }
    input:focus { border-color:var(--accent1); background:#fff; }

    /* Buttons */
    .btn { width:100%; padding:.95rem; background:linear-gradient(135deg,var(--accent1),var(--accent2)); border:none; border-radius:13px; color:#fff; font-weight:700; cursor:pointer; transition: transform 0.2s; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    
    .spinner { display:none; width:18px; height:18px; border:2.5px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; margin:0 auto; }
    .loading .spinner { display:block; }
    .loading .btn-text { display:none; }

    /* Results */
    #result { width:100%; margin-top:1.5rem; }
    .result-card { background:var(--surface); border:1px solid var(--border); border-radius:22px; overflow:hidden; box-shadow:var(--shadow); animation: slideUp 0.4s ease-out; }
    .result-top { background:linear-gradient(135deg,var(--accent1),var(--accent2)); padding:1.6rem; color:#fff; }
    .result-name { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; }
    .result-body { padding:1.5rem; }
    
    .points-block { display:flex; align-items:center; justify-content:space-between; background:rgba(99,102,241,.05); border-radius:16px; padding:1.2rem; margin-bottom:1rem; border: 1px solid var(--border); }
    .pts-value { font-family:'Syne',sans-serif; font-size:2.2rem; font-weight:800; color:var(--accent1); }
    
    .stats-row { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:1.25rem; }
    .stat-box { background:var(--surface2); border:1px solid var(--border); border-radius:14px; padding:.8rem; }
    .s-value { font-size:.85rem; font-weight:700; display:block; overflow:hidden; text-overflow:ellipsis; }
    .s-label { font-size:.65rem; color:var(--muted); text-transform:uppercase; }

    /* QR Section */
    .qr-container { margin-top: 1.2rem; padding-top: 1.2rem; border-top: 1px dashed var(--border); text-align: center; }
    .qr-frame { display: inline-block; padding: 12px; background: #fff; border-radius: 18px; border: 1px solid var(--border); box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
    .qr-frame img { width: 140px; height: 140px; display: block; }

    .error-box { background:#FFF5F5; border:1px solid #FED7D7; border-radius:12px; padding:1rem; color:#C53030; font-size:.9rem; }

    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes slideUp { from{opacity:0; transform:translateY(20px)} to{opacity:1; transform:translateY(0)} }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo-box"><span class="logo-text">BingBang</span></div>
    <h1>Mis <span>Puntos</span></h1>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('phone', this)">📱 Teléfono</button>
    <button class="tab" onclick="switchTab('code', this)">🎫 Código BB</button>
    <button class="tab" onclick="switchTab('id', this)">🪪 ID</button>
  </div>

  <div class="card">
    <div id="panel-phone" class="panel active">
      <div class="field-label">Teléfono</div>
      <input type="tel" id="phoneInput" placeholder="Ej: 8090000000">
    </div>
    <div id="panel-code" class="panel">
      <div class="field-label">Código BB</div>
      <input type="text" id="codeInput" placeholder="Ej: BB-12345">
    </div>
    <div id="panel-id" class="panel">
      <div class="field-label">ID Cliente</div>
      <input type="text" id="idInput" placeholder="Ej: 001002003">
    </div>
    <button class="btn" id="searchBtn" onclick="buscar()">
      <span class="btn-text">Consultar Puntos</span>
      <div class="spinner"></div>
    </button>
  </div>

  <div id="result"></div>
</div>

<script>
  const WEBHOOK_URL = 'https://bingbangrd.duckdns.org/webhook/consulta-puntos';
  let currentTab = 'phone';

  function switchTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
    document.getElementById('result').innerHTML = '';
  }

  async function buscar() {
    const btn = document.getElementById('searchBtn');
    const resultDiv = document.getElementById('result');
    
    // Obtener valores
    const valPhone = document.getElementById('phoneInput').value.trim();
    const valCode = document.getElementById('codeInput').value.trim();
    const valId = document.getElementById('idInput').value.trim();
    
    let queryValue = '';
    let payload = {};

    if(currentTab === 'phone') { queryValue = valPhone; payload.telefono = valPhone; }
    else if(currentTab === 'code') { queryValue = valCode; payload.codigo = valCode; }
    else { queryValue = valId; payload.id = valId; }

    if(!queryValue) return alert("Ingresa un dato para buscar");

    // UI Loading
    btn.classList.add('loading');
    btn.disabled = true;
    resultDiv.innerHTML = '';

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!response.ok) throw new Error('Error en servidor');
      
      const data = await response.json();

      if (data.encontrado || data.nombre) {
        showResult(data);
      } else {
        resultDiv.innerHTML = `<div class="error-box">No se encontró ningún cliente con ese dato.</div>`;
      }
    } catch (err) {
      resultDiv.innerHTML = `<div class="error-box">Error de conexión. Intenta de nuevo.</div>`;
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function showResult(d) {
    // Detectar qué dato usar para el QR (ID o Código)
    const identificador = d.codigo || d.id || "Sin ID";
    const labelID = d.codigo ? 'Código BB' : 'ID Cliente';
    
    // Normalizar puntos (por si vienen como string o nombre diferente)
    const puntos = d.puntos || d.balance || d.puntos_acumulados || 0;
    
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(identificador)}`;

    document.getElementById('result').innerHTML = `
      <div class="result-card">
        <div class="result-top">
          <div style="font-size:0.7rem; text-transform:uppercase; opacity:0.8">Fidelidad BingBang</div>
          <div class="result-name">${d.nombre || 'Cliente'}</div>
          <div style="font-size:0.85rem">📱 ${d.telefono || ''}</div>
        </div>
        <div class="result-body">
          <div class="points-block">
            <div>
              <div class="s-label">Balance Total</div>
              <div class="pts-value">${Number(puntos).toLocaleString()}</div>
            </div>
            <div style="font-size:1.5rem">⭐</div>
          </div>
          
          <div class="stats-row">
            <div class="stat-box">
              <span class="s-label">${labelID}</span>
              <span class="s-value">${identificador}</span>
            </div>
            <div class="stat-box">
              <span class="s-label">Visitas</span>
              <span class="s-value">${d.visitas || 0}</span>
            </div>
          </div>

          <div class="qr-container">
            <div class="s-label" style="margin-bottom:0.5rem">Escanea en Caja</div>
            <div class="qr-frame">
              <img src="${qrUrl}" alt="QR">
            </div>
          </div>
        </div>
      </div>
    `;
    
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }
</script>

</body>
</html>
