<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BigBang — Mis Puntos</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #F0F4FF;
      --white:    #FFFFFF;
      --navy:     #0F1B3D;
      --navy2:    #162244;
      --teal:     #00C9A7;
      --teal2:    #00E8C0;
      --coral:    #FF6B6B;
      --yellow:   #FFD93D;
      --purple:   #A78BFA;
      --text:     #0F1B3D;
      --muted:    rgba(15,27,61,.45);
      --border:   rgba(15,27,61,.08);
      --shadow:   0 4px 24px rgba(15,27,61,.08);
      --shadow-lg:0 12px 48px rgba(15,27,61,.13);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height:100vh;
      background:var(--bg);
      font-family:'Nunito',sans-serif;
      color:var(--text);
      overflow-x:hidden;
    }

    /* Background blobs */
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background:
        radial-gradient(circle 320px at 5% 10%,  rgba(0,201,167,.12) 0%,transparent 70%),
        radial-gradient(circle 280px at 95% 5%,  rgba(167,139,250,.13) 0%,transparent 70%),
        radial-gradient(circle 300px at 90% 95%, rgba(255,107,107,.10) 0%,transparent 70%),
        radial-gradient(circle 260px at 10% 90%, rgba(255,217,61,.10)  0%,transparent 70%);
    }

    .page {
      position:relative; z-index:1;
      max-width:430px; margin:0 auto;
      padding:2.5rem 1.25rem 5rem;
      min-height:100vh;
      display:flex; flex-direction:column; align-items:center;
    }

    /* ── Header ── */
    .header {
      width:100%; text-align:center;
      margin-bottom:2rem;
      animation:popUp .6s cubic-bezier(.34,1.56,.64,1) both;
    }

    .logo-pill {
      display:inline-flex; align-items:center; gap:.6rem;
      background:var(--navy);
      border-radius:100px; padding:.55rem 1.3rem .55rem .7rem;
      margin-bottom:1.5rem;
      box-shadow:0 8px 24px rgba(15,27,61,.25);
    }
    .logo-icon {
      width:36px; height:36px; border-radius:50%;
      background:linear-gradient(135deg,var(--teal),var(--teal2));
      display:flex; align-items:center; justify-content:center;
      font-size:1.1rem;
      box-shadow:0 0 0 3px rgba(0,201,167,.25);
      animation:spinLogo 3s linear infinite;
    }
    .logo-text {
      font-size:1rem; font-weight:900; color:#fff;
      letter-spacing:.5px;
    }

    .header h1 {
      font-size:2.6rem; font-weight:900; line-height:1.05;
      color:var(--navy); letter-spacing:-.5px; margin-bottom:.4rem;
    }
    .header h1 span {
      color:var(--teal);
      display:inline-block;
      animation:wiggle 3s ease-in-out 1s infinite;
    }
    .header p {
      font-size:.85rem; font-weight:600; color:var(--muted);
      letter-spacing:.3px;
    }

    /* ── Tabs ── */
    .tabs-wrap {
      width:100%; margin-bottom:1.5rem;
      animation:popUp .6s .1s cubic-bezier(.34,1.56,.64,1) both;
    }
    .tabs {
      display:flex; gap:.5rem;
      background:var(--white);
      border-radius:20px; padding:.45rem;
      box-shadow:var(--shadow);
    }
    .tab {
      flex:1; padding:.6rem .3rem;
      background:transparent; border:none;
      font-family:'Nunito',sans-serif;
      font-size:.78rem; font-weight:800;
      color:var(--muted); cursor:pointer;
      border-radius:14px; transition:all .22s cubic-bezier(.34,1.56,.64,1);
    }
    .tab.active {
      background:var(--navy);
      color:#fff;
      box-shadow:0 4px 14px rgba(15,27,61,.25);
      transform:scale(1.03);
    }

    /* ── Form Card ── */
    .card {
      width:100%;
      background:var(--white);
      border-radius:24px; padding:1.75rem 1.5rem;
      box-shadow:var(--shadow-lg);
      animation:popUp .6s .15s cubic-bezier(.34,1.56,.64,1) both;
      position:relative; overflow:hidden;
    }
    /* Top color strip */
    .card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:4px;
      background:linear-gradient(90deg, var(--teal), var(--purple), var(--coral));
      border-radius:4px 4px 0 0;
    }

    .panel { display:none; }
    .panel.active { display:block; }

    .field-label {
      font-size:.7rem; text-transform:uppercase;
      letter-spacing:1.8px; color:var(--muted);
      font-weight:800; margin-bottom:.65rem;
    }
    .input-wrap { position:relative; margin-bottom:1.1rem; }
    .input-icon {
      position:absolute; left:1rem; top:50%;
      transform:translateY(-50%); font-size:1rem; pointer-events:none;
    }
    input[type="text"], input[type="tel"] {
      width:100%;
      padding:.9rem 1rem .9rem 2.8rem;
      background:#F7F9FF;
      border:2px solid var(--border);
      border-radius:14px; color:var(--text);
      font-family:'Nunito',sans-serif;
      font-size:1rem; font-weight:700;
      outline:none; transition:border-color .2s, box-shadow .2s;
    }
    input::placeholder { color:rgba(15,27,61,.2); font-weight:600; }
    input:focus {
      border-color:var(--teal);
      box-shadow:0 0 0 4px rgba(0,201,167,.12);
    }

    .input-hint {
      font-size:.72rem; color:var(--muted); font-weight:700;
      margin-top:-.5rem; margin-bottom:1.1rem;
      display:flex; align-items:center; gap:.4rem; flex-wrap:wrap;
    }
    .hint-tag {
      display:inline-flex; align-items:center; gap:.2rem;
      background:#F0F4FF; border:1.5px solid rgba(15,27,61,.1);
      border-radius:8px; padding:.15rem .5rem;
      font-size:.65rem; font-weight:800; color:var(--navy);
    }

    /* ── Button ── */
    .btn {
      width:100%; padding:1.05rem;
      background:linear-gradient(135deg, var(--navy), #1e3a8a);
      border:none; border-radius:16px; color:#fff;
      font-family:'Nunito',sans-serif;
      font-size:.92rem; font-weight:900;
      letter-spacing:.5px;
      cursor:pointer; position:relative; overflow:hidden;
      transition:transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
      box-shadow:0 6px 24px rgba(15,27,61,.3);
    }
    .btn::after {
      content:''; position:absolute;
      top:-50%; left:-50%; width:200%; height:200%;
      background:radial-gradient(circle, rgba(255,255,255,.15) 0%, transparent 60%);
      opacity:0; transition:opacity .3s;
    }
    .btn:hover { transform:translateY(-2px) scale(1.01); box-shadow:0 10px 32px rgba(15,27,61,.35); }
    .btn:hover::after { opacity:1; }
    .btn:active { transform:scale(.98); }
    .btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .btn-text, .spinner { position:relative; z-index:1; }
    .spinner {
      display:none; width:18px; height:18px;
      border:2.5px solid rgba(255,255,255,.3);
      border-top-color:#fff; border-radius:50%;
      animation:spin .7s linear infinite; margin:0 auto;
    }
    .btn.loading .btn-text { display:none; }
    .btn.loading .spinner { display:block; }

    /* ── Result ── */
    #result { width:100%; margin-top:1.5rem; }

    .result-card {
      border-radius:24px; overflow:hidden;
      box-shadow:var(--shadow-lg);
      animation:popUp .5s cubic-bezier(.34,1.56,.64,1) both;
    }

    /* Membership top — navy gradient with accent */
    .result-top {
      padding:1.75rem 1.75rem 1.5rem;
      background:linear-gradient(145deg, var(--navy) 0%, #1a2f60 100%);
      position:relative; overflow:hidden;
    }
    /* Decorative circles */
    .result-top::before {
      content:''; position:absolute; top:-40px; right:-40px;
      width:160px; height:160px; border-radius:50%;
      background:rgba(0,201,167,.12);
      border:1px solid rgba(0,201,167,.15);
    }
    .result-top::after {
      content:''; position:absolute; bottom:-30px; left:-20px;
      width:110px; height:110px; border-radius:50%;
      background:rgba(167,139,250,.1);
      border:1px solid rgba(167,139,250,.12);
    }

    .member-badge {
      display:inline-flex; align-items:center; gap:.4rem;
      background:rgba(0,201,167,.15); border:1px solid rgba(0,201,167,.3);
      border-radius:100px; padding:.3rem .85rem;
      font-size:.65rem; font-weight:800; color:var(--teal2);
      text-transform:uppercase; letter-spacing:1px;
      margin-bottom:1rem; position:relative; z-index:1;
    }
    .member-badge::before { content:'●'; font-size:.5rem; animation:blink 1.5s infinite; }

    .result-name {
      font-size:1.65rem; font-weight:900; line-height:1.1;
      color:#fff; margin-bottom:.25rem;
      position:relative; z-index:1;
    }
    .result-phone {
      font-size:.78rem; font-weight:600; color:rgba(255,255,255,.55);
      position:relative; z-index:1;
    }

    /* Points big display */
    .points-hero {
      margin-top:1.25rem;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.1);
      border-radius:18px; padding:1.1rem 1.25rem;
      display:flex; align-items:center; justify-content:space-between;
      position:relative; z-index:1;
    }
    .pts-number {
      font-size:3.2rem; font-weight:900; line-height:1;
      color:var(--teal2);
      text-shadow:0 0 30px rgba(0,232,192,.35);
    }
    .pts-label {
      font-size:.62rem; font-weight:800; color:rgba(255,255,255,.45);
      text-transform:uppercase; letter-spacing:1.5px; margin-top:.3rem;
    }
    .pts-star {
      font-size:2.2rem; opacity:.9;
      animation:spinStar 4s ease-in-out infinite;
    }

    /* Body */
    .result-body {
      background:var(--white);
      padding:1.25rem;
    }

    .meta-grid { display:grid; grid-template-columns:1fr 1fr; gap:.65rem; margin-bottom:1rem; }
    .meta-grid.solo { grid-template-columns:1fr; }

    .meta-item {
      padding:.85rem .95rem;
      border-radius:16px;
      background:#F7F9FF;
      border:2px solid var(--border);
      position:relative; overflow:hidden;
      transition:transform .2s;
    }
    .meta-item:hover { transform:scale(1.02); }
    .meta-accent {
      position:absolute; top:0; left:0; right:0; height:3px;
      border-radius:3px 3px 0 0;
    }
    .meta-accent.id     { background:linear-gradient(90deg,var(--purple),#c4b5fd); }
    .meta-accent.codigo { background:linear-gradient(90deg,var(--teal),var(--teal2)); }
    .meta-accent.visitas{ background:linear-gradient(90deg,var(--coral),#ffb3b3); }

    .meta-key {
      font-size:.6rem; text-transform:uppercase; letter-spacing:1.5px;
      color:var(--muted); margin-bottom:.3rem; font-weight:800;
    }
    .meta-val {
      font-size:.95rem; font-weight:900; color:var(--navy);
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }

    /* QR */
    .qr-section {
      border-top:2px dashed #EEF0F8;
      padding-top:1.1rem;
      display:flex; flex-direction:column; align-items:center; gap:.65rem;
    }
    .qr-label-row {
      display:flex; align-items:center; gap:.5rem;
      font-size:.65rem; font-weight:800; color:var(--muted);
      text-transform:uppercase; letter-spacing:1.5px;
    }
    .qr-dot { width:6px; height:6px; border-radius:50%; background:var(--teal); }
    .qr-frame {
      padding:8px; background:#fff;
      border-radius:16px;
      border:2px solid var(--border);
      box-shadow:var(--shadow);
    }
    .qr-frame img { width:130px; height:130px; display:block; border-radius:8px; }

    /* Error */
    .error-box {
      padding:1.1rem 1.25rem; border-radius:16px;
      border:2px solid rgba(255,107,107,.25);
      background:rgba(255,107,107,.07);
      display:flex; align-items:center; gap:.6rem;
      animation:popUp .35s cubic-bezier(.34,1.56,.64,1) both;
    }
    .error-box p { font-size:.88rem; font-weight:700; color:#d94f4f; }

    /* Footer */
    .footer {
      margin-top:2.5rem; text-align:center; width:100%;
      animation:popUp .6s .35s cubic-bezier(.34,1.56,.64,1) both;
    }
    .footer-chips {
      display:flex; align-items:center; justify-content:center;
      gap:.4rem; margin-bottom:.65rem;
    }
    .footer-chip {
      height:2px; width:24px; border-radius:2px;
      background:linear-gradient(90deg,var(--teal),var(--purple));
      opacity:.35;
    }
    .footer-chip.mid { width:40px; opacity:.6; }
    .footer p { font-size:.72rem; font-weight:700; color:var(--muted); }
    .footer strong { color:var(--navy); }

    .refresh-btn {
      display:inline-flex; align-items:center; gap:.45rem;
      margin-top:1rem; padding:.55rem 1.3rem;
      background:var(--white);
      border:2px solid var(--border); border-radius:100px;
      color:var(--muted); font-family:'Nunito',sans-serif;
      font-size:.72rem; font-weight:800;
      cursor:pointer; transition:all .2s cubic-bezier(.34,1.56,.64,1);
      box-shadow:var(--shadow);
    }
    .refresh-btn:hover {
      color:var(--navy); border-color:rgba(15,27,61,.2);
      transform:scale(1.05);
    }

    @keyframes popUp    { from{opacity:0;transform:scale(.9) translateY(12px)} to{opacity:1;transform:scale(1) translateY(0)} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    @keyframes spinLogo { to{transform:rotate(360deg)} }
    @keyframes wiggle   { 0%,100%{transform:rotate(0)} 20%{transform:rotate(-4deg)} 40%{transform:rotate(4deg)} 60%{transform:rotate(-2deg)} 80%{transform:rotate(2deg)} }
    @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes spinStar { 0%,100%{transform:rotate(0) scale(1)} 50%{transform:rotate(20deg) scale(1.1)} }

    @media(max-width:380px) {
      .page{padding:2rem 1rem 4rem}
      .pts-number{font-size:2.7rem}
      .header h1{font-size:2.1rem}
    }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="logo-pill">
      <div class="logo-icon">💥</div>
      <span class="logo-text">BigBang</span>
    </div>
    <h1>Mis <span>Puntos</span> 🎯</h1>
    <p>Consulta tu balance de fidelidad</p>
  </div>

  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('phone',this)">📱 Teléfono</button>
      <button class="tab" onclick="switchTab('code',this)">🎫 Código BB</button>
      <button class="tab" onclick="switchTab('id',this)">🪪 ID</button>
    </div>
  </div>

  <div class="card">
    <div class="panel active" id="panel-phone">
      <div class="field-label">Número de teléfono</div>
      <div class="input-wrap">
        <span class="input-icon">📱</span>
        <input type="tel" id="phoneInput" inputmode="numeric" placeholder="Ej: 8092224455" maxlength="15"/>
      </div>
      <div class="input-hint">
        El resultado mostrará tu
        <span class="hint-tag">🪪 ID</span>
        o <span class="hint-tag">🎫 Código BB</span>
      </div>
    </div>
    <div class="panel" id="panel-code">
      <div class="field-label">Código BB</div>
      <div class="input-wrap">
        <span class="input-icon">🎫</span>
        <input type="text" id="codeInput" placeholder="Ej: BB-000000" maxlength="20"/>
      </div>
    </div>
    <div class="panel" id="panel-id">
      <div class="field-label">ID de cliente</div>
      <div class="input-wrap">
        <span class="input-icon">🪪</span>
        <input type="tel" id="idInput" inputmode="numeric" placeholder="Ej: 00100022445" maxlength="40"/>
      </div>
    </div>

    <button class="btn" id="searchBtn" onclick="buscar()">
      <span class="btn-text">✦ Consultar Puntos</span>
      <div class="spinner"></div>
    </button>
  </div>

  <div id="result"></div>

  <div class="footer">
    <div class="footer-chips">
      <div class="footer-chip"></div>
      <div class="footer-chip mid"></div>
      <div class="footer-chip"></div>
    </div>
    <p>Sistema de Fidelidad — <strong>BigBang RD</strong></p>
    <button class="refresh-btn" onclick="location.reload()">↻ Refrescar</button>
  </div>
</div>

<script>
  const WEBHOOK_URL = 'https://n8n-stanlyrodriguez-vps.duckdns.org/webhook/consulta-puntos';
  let activeTab = 'phone';

  function switchTab(tab, el) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
    document.getElementById('result').innerHTML = '';
  }

  async function buscar() {
    const vals = {
      phone: document.getElementById('phoneInput').value.replace(/\D/g,'').trim(),
      code:  document.getElementById('codeInput').value.trim().toUpperCase(),
      id:    document.getElementById('idInput').value.trim()
    };
    const entrada = activeTab === 'phone' ? vals.phone : activeTab === 'code' ? vals.code : vals.id;
    if (!entrada) { showError('Por favor ingresa un valor.'); return; }

    const btn = document.getElementById('searchBtn');
    btn.classList.add('loading'); btn.disabled = true;

    try {
      const body = {};
      if (activeTab === 'phone') body.telefono = entrada;
      if (activeTab === 'code')  body.codigo   = entrada;
      if (activeTab === 'id')    body.id       = entrada;

      const res = await fetch(WEBHOOK_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(body)
      });
      const data = await res.json();

      if (data.encontrado || data.nombre) showResult(data);
      else showError(data.error || 'Cliente no encontrado.');
    } catch(e) {
      showError('Error de conexión. Intenta de nuevo.');
    } finally {
      btn.classList.remove('loading'); btn.disabled = false;
    }
  }

  function showResult(d) {
    const hasId      = d.id      && String(d.id).trim()     !== '';
    const hasCodigo  = d.codigo  && String(d.codigo).trim() !== '';
    const hasVisitas = d.visitas !== undefined && d.visitas  !== null;

    const metaItems = [];
    if (hasId)     metaItems.push({ icon:'🪪', key:'ID Cliente', val:d.id,     cls:'id' });
    if (hasCodigo) metaItems.push({ icon:'🎫', key:'Código BB',  val:d.codigo, cls:'codigo' });
    if (hasVisitas && metaItems.length < 2)
      metaItems.push({ icon:'🏪', key:'Visitas', val:d.visitas, cls:'visitas' });
    if (metaItems.length === 0 && hasVisitas)
      metaItems.push({ icon:'🏪', key:'Visitas', val:d.visitas, cls:'visitas' });

    const gridClass = metaItems.length === 1 ? 'meta-grid solo' : 'meta-grid';
    const metaHTML  = metaItems.map(m => `
      <div class="meta-item">
        <div class="meta-accent ${m.cls}"></div>
        <div class="meta-key">${m.icon} ${m.key}</div>
        <div class="meta-val">${m.val}</div>
      </div>`).join('');

    const qrValue = d.codigo || d.id || '';
    const qrHTML  = qrValue ? `
      <div class="qr-section">
        <div class="qr-label-row">
          <div class="qr-dot"></div>
          Tu QR de Membresía
          <div class="qr-dot"></div>
        </div>
        <div class="qr-frame">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=${encodeURIComponent(qrValue)}&bgcolor=FFFFFF&color=0F1B3D" alt="QR"/>
        </div>
      </div>` : '';

    document.getElementById('result').innerHTML = `
      <div class="result-card">
        <div class="result-top">
          <div class="member-badge">Miembro BigBang</div>
          <div class="result-name">${d.nombre}</div>
          <div class="result-phone">${d.telefono ? '📱 ' + d.telefono : ''}</div>
          <div class="points-hero">
            <div>
              <div class="pts-number">${Number(d.puntos||0).toLocaleString('es-DO')}</div>
              <div class="pts-label">Puntos acumulados</div>
            </div>
            <div class="pts-star">⭐</div>
          </div>
        </div>
        <div class="result-body">
          <div class="${gridClass}">${metaHTML}</div>
          ${qrHTML}
        </div>
      </div>`;

    setTimeout(() => document.getElementById('result').scrollIntoView({behavior:'smooth'}), 300);
  }

  function showError(msg) {
    document.getElementById('result').innerHTML =
      `<div class="error-box"><p>⚠️ ${msg}</p></div>`;
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') buscar(); });
</script>
</body>
</html>
